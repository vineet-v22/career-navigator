<!DOCTYPE html>
<html>
<head>
    <title>Career Navigator</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">
    <h1>🚀 Career Navigator</h1>

    <!-- USER ID -->
    <div class="card">
        <h3>User</h3>
        <input type="text" id="userId" placeholder="Enter User ID">
    </div>

    <!-- ANALYZE ROLE -->
    <div class="card">
        <h3>Analyze Role</h3>
        <input type="text" id="role" placeholder="Enter role (e.g., DevOps Engineer)">
        <button onclick="analyze()">Analyze</button>
        <p id="analyzeError" style="color:red;"></p>

        <!-- RESULT (MOVED HERE) -->
        <div id="resultCard" style="margin-top:20px; display:none;">
            <hr>
            <h4>Analysis Result</h4>
            <div id="output"></div>
        </div>
    </div>

    <!-- UPDATE SKILLS -->
    <div class="card">
        <h3>Update Your Skills</h3>
        <input type="text" id="skills" placeholder="Comma separated skills">
        <button onclick="updateSkills()">Add Skills</button>
        <p id="skillsError" style="color:red;"></p>
    </div>

    <!-- ROLES -->
    <div class="card">
        <h3>Available Roles</h3>
        <button onclick="loadRoles()">Load Roles</button>
        <ul id="rolesList"></ul>
        <p id="rolesError" style="color:red;"></p>
    </div>
</div>

<script>
function clearErrors() {
    document.getElementById("analyzeError").innerText = "";
    document.getElementById("skillsError").innerText = "";
    document.getElementById("rolesError").innerText = "";
}

// 🔍 ANALYZE ROLE
async function analyze() {
    clearErrors();

    const role = document.getElementById("role").value.trim();
    const userId = document.getElementById("userId").value.trim();

    if (!userId) {
        document.getElementById("analyzeError").innerText = "Please enter User ID.";
        return;
    }

    if (!role) {
        document.getElementById("analyzeError").innerText = "Please enter a role.";
        return;
    }

    const resultCard = document.getElementById("resultCard");
    const output = document.getElementById("output");

    resultCard.style.display = "block";
    output.innerHTML = "⏳ Loading...";

    try {
        const res = await fetch(`/analyze/${userId}/${encodeURIComponent(role)}`);

        if (!res.ok) throw new Error("Server error");

        const data = await res.json();

        if (data.error) {
            output.innerHTML = `<p style="color:red;">${data.error}</p>`;
            return;
        }

        output.innerHTML = `
            <p><strong>Role:</strong> ${data.role}</p>
            <p><strong>Your Skills:</strong> ${data.your_skills.join(", ") || "None"}</p>

            <p><strong>Missing Skills:</strong></p>
            <ul>${data.missing_skills.map(s => `<li style="color:red;">${s}</li>`).join("")}</ul>

            <p><strong>Roadmap:</strong></p>
            <ul>${data.roadmap.map(step => `<li>${step}</li>`).join("")}</ul>

            <p><strong>Generated By:</strong> ${data.generated_by}</p>
        `;

    } catch (err) {
        output.innerHTML = `<p style="color:red;">Failed to fetch data.</p>`;
    }
}

// ✏️ UPDATE SKILLS
async function updateSkills() {
    clearErrors();

    const skillsInput = document.getElementById("skills").value;
    const userId = document.getElementById("userId").value.trim();

    if (!userId) {
        document.getElementById("skillsError").innerText = "Please enter User ID.";
        return;
    }

    if (!skillsInput.trim()) {
        document.getElementById("skillsError").innerText = "Enter skills.";
        return;
    }

    const skills = skillsInput
        .split(",")
        .map(s => s.trim())
        .filter(s => s.length > 0);

    try {
        const res = await fetch(`/update-skills/${userId}`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(skills)
        });

        if (!res.ok) throw new Error();

        const data = await res.json();

        alert("✅ Skills added!\n\n" + data.skills.join(", "));

    } catch {
        document.getElementById("skillsError").innerText = "Failed to update.";
    }
}

// 📋 LOAD ROLES
async function loadRoles() {
    clearErrors();

    try {
        const res = await fetch("/roles");

        if (!res.ok) throw new Error();

        const data = await res.json();

        document.getElementById("rolesList").innerHTML =
            data.roles.map(r => `<li>${r}</li>`).join("");

    } catch {
        document.getElementById("rolesError").innerText = "Failed to load roles.";
    }
}
</script>

</body>
</html>
